<div class="card bg-light m-3">
<div class="card-body">
    <h3>Instructions</h3>

    <p>
        This is a Dutch (descending) auction for one item.
        Each bidder has a private value for the item.
    </p>

    <p>
        Instead of a live auction, you enter the price at which you would stop the clock.
        The highest stop price wins and pays that price.
    </p>

    <p>
        Winner payoff = value - price. Other bidders receive 0.
    </p>
</div>
</div>
